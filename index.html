<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halftone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="field" id="field"></div>

  <!-- ── RIGHT PANEL ── -->
  <div class="panel" id="panel">
    <button class="panel-toggle" id="panelToggle">◀</button>
    <div class="panel-body">

      <div class="panel-row">
        <div class="panel-label">Field&nbsp;<span id="fieldVal">8</span>px</div>
        <input type="range" id="fieldSlider" min="3" max="30" value="8" step="1">
      </div>

      <div class="panel-divider"></div>

      <div class="panel-label">Add shape</div>
      <button class="shape-btn" data-shape="circle">Circle</button>
      <button class="shape-btn" data-shape="square">Square</button>
      <button class="shape-btn" data-shape="triangle">Triangle</button>

    </div>
  </div>

  <script src="main.js"></script>

</body>
</html>
